<!DOCTYPE html>
<html lang="{{ lang.get('code', 'ru') }}" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stats — {% block title %}PSI Калькулятор{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#ffc107">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-warning sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="/">
                <i class="bi bi-trophy-fill"></i> Brawl Stats
            </a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/"><i class="bi bi-search"></i> {{ lang.search }}</a>
                    <a class="nav-link" href="/compare"><i class="bi bi-arrow-left-right"></i> {{ lang.compare }}</a>
                    <a class="nav-link" href="/rankings"><i class="bi bi-trophy"></i> {{ lang.rankings }}</a>
                    <a class="nav-link" href="/brawlers"><i class="bi bi-person-badge"></i> {{ lang.brawlers }}</a>
                    <a class="nav-link" href="/tag-converter"><i class="bi bi-arrow-repeat"></i> {{ lang.converter }}</a>
                    <a class="nav-link" href="/random"><i class="bi bi-shuffle"></i> {{ lang.random }}</a>
                    <a class="nav-link" href="/mini-game"><i class="bi bi-controller"></i> Мини-игра</a>
                    <a class="nav-link" href="/set-lang/ru">🇷🇺</a>
                    <a class="nav-link" href="/set-lang/en">🇬🇧</a>
                    <a class="nav-link" href="#" onclick="toggleTheme()"><i class="bi bi-sun-fill" id="themeIcon"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-secondary py-3 border-top border-warning mt-4">
        <small>Brawl Stars Stats v2.2 — Player Skill Index &copy; 2026</small>
    </footer>

    {% block extra_scripts %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.getAttribute('data-bs-theme') === 'dark') {
                html.setAttribute('data-bs-theme', 'light');
                icon.className = 'bi bi-moon-fill';
            } else {
                html.setAttribute('data-bs-theme', 'dark');
                icon.className = 'bi bi-sun-fill';
            }
        }

        function exportToPNG(elementId) {
            const el = document.getElementById(elementId);
            html2canvas(el, { scale: 2, backgroundColor: '#0d1117' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'brawl-stats.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function shareProfile(tag) {
            const url = window.location.origin + '/player/' + tag;
            navigator.clipboard.writeText(url).then(() => {
                alert('Ссылка скопирована: ' + url);
            });
        }
    </script>
</body>
</html>
